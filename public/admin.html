<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>NUNI — Tableau de bord admin</title>
<style>
  * { box-sizing: border-box; }
  body{font-family:-apple-system,Segoe UI,Roboto,sans-serif; background:#0A0A10; color:#EDEDED; max-width:900px; margin:0 auto; padding:30px 20px 80px;}
  h1{color:#D4AF6A; font-size:22px; margin-bottom:4px;}
  .subtitle{color:#888; font-size:13px; margin-bottom:24px;}
  label{font-size:13px; color:#999; display:block; margin-top:10px;}
  input, select{width:100%; padding:10px; margin:6px 0 4px; border-radius:8px; border:1px solid #292940; background:#151520; color:#fff; box-sizing:border-box; font-size:14px;}
  button{padding:9px 18px; border-radius:20px; border:none; font-weight:700; cursor:pointer; font-size:13px;}
  .tabs{display:flex; gap:8px; margin:20px 0 24px; flex-wrap:wrap; border-bottom:1px solid #23233a; padding-bottom:14px;}
  .tab-btn{background:#151520; color:#999; border:1px solid #292940; border-radius:20px; padding:8px 16px;}
  .tab-btn.active{background:linear-gradient(135deg,#D4AF6A,#8E63C9); color:#141220; border-color:transparent;}
  .pane{display:none;}
  .pane.active{display:block;}
  .card{background:#141420; border:1px solid #23233a; border-radius:12px; padding:16px; margin-bottom:12px;}
  .row{display:flex; justify-content:space-between; align-items:center; gap:12px; flex-wrap:wrap;}
  .muted{color:#888; font-size:12.5px;}
  .approve{background:#1E8449; color:#fff;}
  .reject{background:#7a2020; color:#fff;}
  .primary{background:linear-gradient(135deg,#D4AF6A,#8E63C9); color:#141220;}
  .secondary{background:#7a5c20; color:#fff;}
  .msg{font-size:13px; margin-top:10px; padding:8px 12px; border-radius:8px;}
  .msg.ok{background:rgba(30,132,73,0.2); color:#7ee6a8;}
  .msg.err{background:rgba(122,32,32,0.25); color:#f29a9a;}
  table{width:100%; border-collapse:collapse; font-size:12.5px; margin-top:10px;}
  th, td{padding:8px; text-align:left; border-bottom:1px solid #23233a;}
  th{color:#D4AF6A; font-weight:700;}
  .pill{display:inline-block; padding:2px 8px; border-radius:12px; font-size:11px; font-weight:700;}
  .pill.artist{background:rgba(212,175,106,0.18); color:#D4AF6A;}
  .pill.consumer{background:rgba(110,69,168,0.2); color:#b79bea;}
  .pill.verified{background:rgba(30,132,73,0.2); color:#7ee6a8;}
  .cover-thumb{width:44px; height:44px; border-radius:6px; background-size:cover; background-position:center; background-color:#222;}
</style>
</head>
<body>
  <h1>🛠️ NUNI — Tableau de bord admin</h1>
  <div class="subtitle">Un seul endroit pour tout gérer : Pass, certifications, morceaux, utilisateurs.</div>

  <label>Clé admin (secrète)</label>
  <input id="key" type="password" placeholder="Votre clé admin">

  <div class="tabs">
    <button class="tab-btn active" data-tab="activate">💳 Activer un Pass</button>
    <button class="tab-btn" data-tab="cert">🏅 Certifications</button>
    <button class="tab-btn" data-tab="tracks">🎵 Morceaux</button>
    <button class="tab-btn" data-tab="users">👥 Utilisateurs</button>
  </div>

  <!-- ONGLET 1 : ACTIVER UN PASS -->
  <div class="pane active" id="pane-activate">
    <div class="card">
      <label>Email du client (utilisé à l'inscription)</label>
      <input id="act-email" type="text" placeholder="email@exemple.com">
      <label>Pass souscrit</label>
      <select id="act-plan"><option value="consumer">Pass Consommateur</option><option value="artist">Pass Artiste</option></select>
      <label>Durée</label>
      <select id="act-duration">
        <option value="30">1 mois (30 jours)</option>
        <option value="90" selected>3 mois (90 jours)</option>
        <option value="365">1 an (365 jours)</option>
      </select>
      <button class="primary" style="margin-top:14px; width:100%;" onclick="activate()">Activer et envoyer le code par email</button>
      <div id="act-msg"></div>
    </div>
  </div>

  <!-- ONGLET 2 : CERTIFICATIONS -->
  <div class="pane" id="pane-cert">
    <button class="secondary" onclick="loadPending()">Charger les demandes en attente</button>
    <div id="cert-list" style="margin-top:14px;"></div>
    <div class="card" style="margin-top:20px;">
      <b style="color:#D4AF6A; font-size:13px;">🧹 Réinitialiser une certification (comptes de test)</b>
      <label>Email du compte à réinitialiser</label>
      <input id="reset-email" type="text" placeholder="email@exemple.com">
      <button class="secondary" style="margin-top:10px;" onclick="resetCert()">Réinitialiser</button>
    </div>
  </div>

  <!-- ONGLET 3 : MORCEAUX -->
  <div class="pane" id="pane-tracks">
    <button class="secondary" onclick="loadTracks()">Charger les morceaux publiés</button>
    <div id="tracks-list" style="margin-top:14px;"></div>
  </div>

  <!-- ONGLET 4 : UTILISATEURS -->
  <div class="pane" id="pane-users">
    <button class="secondary" onclick="loadUsers()">Charger les utilisateurs</button>
    <div id="users-list" style="margin-top:14px;"></div>
  </div>

<script>
  function getKey(){ const k = document.getElementById('key').value; localStorage.setItem('nuniAdminKey', k); return k; }

  document.querySelectorAll('.tab-btn').forEach(btn=>{
    btn.onclick = ()=>{
      document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active'));
      document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
      btn.classList.add('active');
      document.getElementById('pane-'+btn.dataset.tab).classList.add('active');
    };
  });

  async function activate(){
    const email = document.getElementById('act-email').value.replace(/\s+/g, '');
    const plan = document.getElementById('act-plan').value;
    const durationDays = document.getElementById('act-duration').value;
    const msg = document.getElementById('act-msg');
    msg.innerHTML = '<div class="msg">Activation en cours…</div>';
    try{
      const res = await fetch('/api/admin/activate-by-email', {
        method:'POST', headers:{'Content-Type':'application/json','x-admin-key':getKey()},
        body: JSON.stringify({ email, plan, durationDays: Number(durationDays) })
      });
      const data = await res.json();
      if(!res.ok){ msg.innerHTML = '<div class="msg err">❌ '+(data.error||'Erreur')+'</div>'; return; }
      msg.innerHTML = '<div class="msg ok">✅ '+data.message+'</div><div class="card" style="text-align:center; font-size:22px; letter-spacing:4px; font-weight:700; color:#D4AF6A;">'+data.access_code+'</div>';
    }catch(e){ msg.innerHTML = '<div class="msg err">❌ Impossible de contacter le serveur.</div>'; }
  }

  async function loadPending(){
    const list = document.getElementById('cert-list');
    list.innerHTML = 'Chargement…';
    try{
      const res = await fetch('/api/admin/verification/pending', { headers:{'x-admin-key':getKey()} });
      const data = await res.json();
      if(!res.ok){ list.innerHTML = '<div class="msg err">❌ '+(data.error||'Erreur')+'</div>'; return; }
      if(!data.pending.length){ list.innerHTML = '<p class="muted">Aucune demande en attente.</p>'; return; }
      list.innerHTML = '';
      data.pending.forEach(u=>{
        const card = document.createElement('div');
        card.className = 'card row';
        card.innerHTML = '<div><b>'+(u.artist_name||u.first_name)+'</b><br><span class="muted">'+u.email+'</span></div><div><button class="approve">Certifier</button> <button class="reject">Refuser</button></div>';
        card.querySelector('.approve').onclick = ()=> decide(u.email, true);
        card.querySelector('.reject').onclick = ()=> decide(u.email, false);
        list.appendChild(card);
      });
    }catch(e){ list.innerHTML = '<div class="msg err">❌ Impossible de contacter le serveur.</div>'; }
  }

  async function decide(email, approve){
    try{
      const res = await fetch('/api/admin/verification/decide', {
        method:'POST', headers:{'Content-Type':'application/json','x-admin-key':getKey()},
        body: JSON.stringify({ email, approve })
      });
      const data = await res.json();
      alert(data.message || data.error);
      loadPending();
    }catch(e){ alert('Erreur de connexion au serveur.'); }
  }

  async function resetCert(){
    const email = document.getElementById('reset-email').value.trim();
    try{
      const res = await fetch('/api/admin/verification/reset', {
        method:'POST', headers:{'Content-Type':'application/json','x-admin-key':getKey()},
        body: JSON.stringify({ email })
      });
      const data = await res.json();
      alert(data.message || data.error);
    }catch(e){ alert('Erreur de connexion au serveur.'); }
  }

  async function loadTracks(){
    const list = document.getElementById('tracks-list');
    list.innerHTML = 'Chargement…';
    try{
      const res = await fetch('/api/tracks');
      const data = await res.json();
      if(!data.tracks || !data.tracks.length){ list.innerHTML = '<p class="muted">Aucun morceau publié pour le moment.</p>'; return; }
      let html = '<table><tr><th></th><th>Titre</th><th>Artiste</th><th>Type</th><th>Genre</th><th>Publié le</th></tr>';
      data.tracks.forEach(t=>{
        const cover = t.cover_url ? '<div class="cover-thumb" style="background-image:url('+t.cover_url+')"></div>' : '<div class="cover-thumb"></div>';
        html += '<tr><td>'+cover+'</td><td>'+t.title+'</td><td>'+(t.artist_name||'—')+(t.is_verified?' <span class="pill verified">✓</span>':'')+'</td><td>'+(t.release_type||'Single')+'</td><td>'+(t.genre||'—')+'</td><td>'+new Date(t.created_at).toLocaleDateString('fr-FR')+'</td></tr>';
      });
      html += '</table>';
      list.innerHTML = html;
    }catch(e){ list.innerHTML = '<div class="msg err">❌ Impossible de contacter le serveur.</div>'; }
  }

  async function loadUsers(){
    const list = document.getElementById('users-list');
    list.innerHTML = 'Chargement…';
    try{
      const res = await fetch('/api/admin/users', { headers:{'x-admin-key':getKey()} });
      const data = await res.json();
      if(!res.ok){ list.innerHTML = '<div class="msg err">❌ '+(data.error||'Erreur')+'</div>'; return; }
      let html = '<table><tr><th>Nom</th><th>Email</th><th>Type</th><th>Pass</th><th>Statut</th><th>Sons</th><th>Abonnés</th><th>Inscrit le</th></tr>';
      data.users.forEach(u=>{
        const name = u.account_type === 'artist' ? (u.artist_name || u.first_name) : (u.first_name+' '+u.last_name);
        const typePill = u.account_type === 'artist' ? '<span class="pill artist">Artiste</span>' : '<span class="pill consumer">Consommateur</span>';
        const verified = u.is_verified ? ' <span class="pill verified">✓</span>' : '';
        html += '<tr><td>'+name+verified+'</td><td>'+u.email+'</td><td>'+typePill+'</td><td>'+(u.plan||'—')+'</td><td>'+(u.subscription_status||'—')+'</td><td>'+(u.track_count!=null?u.track_count:'—')+'</td><td>'+(u.follower_count!=null?u.follower_count:'—')+'</td><td>'+new Date(u.created_at).toLocaleDateString('fr-FR')+'</td></tr>';
      });
      html += '</table>';
      list.innerHTML = html;
    }catch(e){ list.innerHTML = '<div class="msg err">❌ Impossible de contacter le serveur.</div>'; }
  }

  window.addEventListener('load', ()=>{ const k = localStorage.getItem('nuniAdminKey'); if(k) document.getElementById('key').value = k; });
</script>
</body>
</html>
